# Time window for article freshness
lookback_days: 7

# Optional: emit score signal breakdowns for non-full/borderline
# completeness classifications at DEBUG log level.
debug_completeness_signals: false

# === RSS Feeds ===
# Each feed is polled and filtered to articles within the lookback window.
rss_feeds:
  # Company blogs — always free, often where news breaks first
  - name: "OpenAI Blog"
    url: "https://openai.com/blog/rss.xml"
  - name: "Google - The Keyword"
    url: "https://blog.google/rss/"
  # - name: "Anthropic Blog"
  #   url: "https://www.anthropic.com/rss.xml"
  # - name: "Meta AI Blog"
  #   url: "https://ai.meta.com/blog/rss/"
  - name: "Microsoft Research Blog"
    url: "https://www.microsoft.com/en-us/research/feed/"
  # - name: "Mistral Blog"
  #   url: "https://mistral.ai/feed/"

  # Major tech/AI journalism
  - name: "TechCrunch"
    url: "https://techcrunch.com/feed/"
  - name: "The Verge"
    url: "https://www.theverge.com/rss/index.xml"
  - name: "Ars Technica"
    url: "https://feeds.arstechnica.com/arstechnica/index"
  - name: "WIRED"
    url: "https://www.wired.com/feed/rss"
  - name: "VentureBeat AI"
    url: "https://venturebeat.com/category/ai/feed"
  - name: "The Register"
    url: "https://www.theregister.com/headlines.atom"
  - name: "The Hacker News"
    url: "https://feeds.feedburner.com/TheHackersNews"
  - name: "CyberScoop"
    url: "https://cyberscoop.com/feed/"
  - name: "Geeky Gadgets"
    url: "https://www.geeky-gadgets.com/feed/"
  - name: "The Guardian - Technology"
    url: "https://www.theguardian.com/technology/rss"
  # - name: "AP News - Technology"
  #   url: "https://rsshub.app/apnews/topics/technology"
  - name: "Axios"
    url: "https://api.axios.com/feed/"
  - name: "Poynter"
    url: "https://www.poynter.org/feed/"

# === NewsAPI Keyword Queries ===
# Each query is run against NewsAPI.org /v2/everything
newsapi_queries:
  # Legal AI — niche, won't appear in general tech RSS feeds
  - "CoCounsel AI"
  - "Harvey AI legal"
  - "AI law"
  - "AI legal technology"
  - "Legora AI"
  - "LexText"
  - "Rhetoric AI legal"
  - "Protege legal AI"
  - "AI law school"

  # Higher ed — niche
  - "AI higher education"
  - "Stanford artificial intelligence"

  # Broad discovery — catches stories from sources outside your RSS list
  - "artificial intelligence breakthrough"
  - "AI startup funding"
  - "AI regulation policy"
  - "AI copyright lawsuit"

